name: Database Deploy

on:
  push:
    branches: [main]
    paths:
      - 'Database/**'
      - 'Backend/Recruitment.API/**'
      - 'Backend/Recruitment.Persistence/**'
      - '.github/workflows/database-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

env:
  DOTNET_VERSION: '8.0.x'
  API_PROJECT_PATH: 'Backend/Recruitment.API/Recruitment.API.csproj'

jobs:
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Remove generated build artifacts
        shell: bash
        run: find Backend -type d \( -name bin -o -name obj \) -prune -exec rm -rf {} +

      - name: Restore packages
        run: dotnet restore ${{ env.API_PROJECT_PATH }}

      - name: Build API
        run: dotnet build ${{ env.API_PROJECT_PATH }} --no-restore --configuration Release

      - name: Validate Azure SQL secret
        shell: bash
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
        run: |
          if [ -z "${ConnectionStrings__DefaultConnection}" ]; then
            echo "::error::GitHub secret AZURE_SQL_CONNECTION_STRING is missing or empty for this environment."
            exit 1
          fi

      - name: Apply EF Core migrations
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          SeedDemoData: 'false'
        run: >
          dotnet run
          --project ${{ env.API_PROJECT_PATH }}
          --no-build
          --configuration Release
          --
          --migrate-only
