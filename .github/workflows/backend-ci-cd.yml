name: Backend CI/CD

on:
  push:
    branches: [main, development]
    paths:
      - 'Backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches: [main, development]
    paths:
      - 'Backend/**'

env:
  DOTNET_VERSION: '8.0.x'
  SOLUTION_PATH: 'Backend/RecruitmentManagementSystem.sln'
  API_PROJECT_PATH: 'Backend/Recruitment.API/Recruitment.API.csproj'
  PUBLISH_OUTPUT: './publish'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Remove generated build artifacts
        shell: bash
        run: find Backend -type d \( -name bin -o -name obj \) -prune -exec rm -rf {} +

      - name: Restore NuGet packages
        run: dotnet restore ${{ env.API_PROJECT_PATH }}

      - name: Build solution
        run: dotnet build ${{ env.API_PROJECT_PATH }} --no-restore --configuration Release

      - name: Run unit tests
        run: |
          if [ -d "Backend/Recruitment.Tests" ]; then
            dotnet test Backend/Recruitment.Tests --no-build --verbosity normal
          else
            echo "No test project found, skipping tests."
          fi

      - name: Publish application
        run: dotnet publish ${{ env.API_PROJECT_PATH }} --no-build --configuration Release --output ${{ env.PUBLISH_OUTPUT }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: ${{ env.PUBLISH_OUTPUT }}
          retention-days: 1

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: ${{ env.PUBLISH_OUTPUT }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_OUTPUT }}
